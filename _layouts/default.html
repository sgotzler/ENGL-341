<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

{% include header.html %}

<main id="main">
  {{ content }}
</main>

{% include footer.html %}

{% if page.hide_menu %}{% else %}
<nav id="menu" class="menu" aria-label="Main">
  <div class="menu-inner">
    <a href="#" class="menu-close" aria-label="Close menu">&times;</a>
    <h2>Menu</h2>
    <ul>
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/overview-and-outline.html' | relative_url }}">Overview and Outline</a></li>
      <li><a href="{{ '/assignments-and-materials.html' | relative_url }}">Assignments and Materials</a></li>
      <li><a href="{{ '/gameplay-activities.html' | relative_url }}">Gameplay Activities</a></li>
    </ul>
    <h3>Contact</h3>
    <ul class="contact-list">
      <li><span class="label">Email</span><a href="mailto:{{ site.contact.email }}">{{ site.contact.email }}</a></li>
      <li><span class="label">Zoom</span><a href="{{ site.contact.zoom }}">unc.zoom.us</a></li>
    </ul>
  </div>
</nav>

<a id="menu-close-overlay" href="#"></a>
{% endif %}

<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
